version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: db_pedidos
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 20221si028
      POSTGRES_DB: pedidos_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - netatividade01
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  fastapi:
    build: ./backend
    container_name: api_pedidos
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=20221si028
      - DB_NAME=pedidos_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - netatividade01

  nginx:
    image: nginx:alpine
    container_name: proxy_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    ports:
      - "80:8080"
      - "443:8443"
    depends_on:
      - fastapi
    networks:
      - netatividade01

networks:
  netatividade01:
    driver: bridge

volumes:
  pgdata: