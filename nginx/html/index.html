<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Control v2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
    <header class="header">
        <div class="brand">
            <span class="brand-title">&#9632; System Control</span>
            <span class="brand-sub">Grupo 06 &middot; v2.0</span>
        </div>
        <span class="badge-online">Online</span>
    </header>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">Total de registros</div>
            <div class="stat-val" id="count-total">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Pendentes</div>
            <div class="stat-val s-warn" id="count-pend">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Concluídos</div>
            <div class="stat-val s-ok" id="count-done">0</div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-header-label">+ Registrar entrada</span>
        </div>
        <div class="card-body">
            <div class="form-grid">
                <div class="field">
                    <label for="f-cliente">Cliente / identificação</label>
                    <input type="text" id="f-cliente" placeholder="Nome do cliente..." autocomplete="off">
                </div>
                <div class="field">
                    <label for="f-status">Classificação</label>
                    <select id="f-status">
                        <option value="Pendente">Pendente</option>
                        <option value="Em Andamento">Em andamento</option>
                        <option value="Concluido">Concluído</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="criar()">Registrar</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-header-label">&#9776; Registros em banco</span>
            <span id="badge-count" class="badge-count"></span>
        </div>
        <div class="table-head">
            <span>Cliente</span>
            <span>Status</span>
            <span class="col-right">Ações</span>
        </div>
        <div id="data-list"></div>
    </div>
</div>

<!-- Modal Editar -->
<div id="modal-edit" class="overlay" onclick="overlayClick(event,'modal-edit')">
    <div class="modal">
        <div class="modal-header">&#9998; Modificar dados</div>
        <input type="hidden" id="edit-id">
        <div class="modal-body">
            <div class="field">
                <label for="edit-cliente">Nome</label>
                <input type="text" id="edit-cliente">
            </div>
            <div class="field">
                <label for="edit-status">Status</label>
                <select id="edit-status">
                    <option value="Pendente">Pendente</option>
                    <option value="Em Andamento">Em andamento</option>
                    <option value="Concluido">Concluído</option>
                </select>
            </div>
        </div>
        <div class="modal-foot">
            <button class="btn" onclick="closeModal('modal-edit')">Cancelar</button>
            <button class="btn btn-primary" onclick="salvar()">&#10003; Gravar</button>
        </div>
    </div>
</div>

<!-- Modal Deletar -->
<div id="modal-del" class="overlay" onclick="overlayClick(event,'modal-del')">
    <div class="modal">
        <div class="modal-header danger-header">&#9888; Confirmar exclusão</div>
        <input type="hidden" id="del-id">
        <div class="modal-body">
            <p class="warn-text">O registro será removido permanentemente do sistema. Esta ação não pode ser desfeita.</p>
        </div>
        <div class="modal-foot">
            <button class="btn" onclick="closeModal('modal-del')">Voltar</button>
            <button class="btn btn-danger" onclick="confirmarDel()">&#128465; Confirmar exclusão</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
    <span class="toast-dot" id="toast-dot"></span>
    <span id="toast-msg"></span>
</div>

<script src="script.js"></script>
</body>
</html>
