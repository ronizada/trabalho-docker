<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM CONTROL v1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="main-header">
            <div class="logo-area">
                <span class="system-id">SYSTEM CONTROL / / GRUPO 06</span>
                <span class="status-indicator">ONLINE</span>
            </div>
            <div class="data-summary">
                COUNT: <span id="reg-count">00</span>
            </div>
        </header>

        <main class="content">
            <section class="action-panel">
                <div class="panel-header">REGISTRAR ENTRADA</div>
                <div class="input-row">
                    <div class="input-group">
                        <label>CLIENTE / IDENTIFICAÇÃO</label>
                        <input type="text" id="cliente" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label>CLASSIFICAÇÃO</label>
                        <select id="status">
                            <option value="Pendente">PENDENTE</option>
                            <option value="Em Andamento">EM ANDAMENTO</option>
                            <option value="Concluido">CONCLUIDO</option>
                        </select>
                    </div>
                    <button class="btn-submit" onclick="criar()">EXECUTAR</button>
                </div>
            </section>

            <section class="list-panel">
                <div class="panel-header">REGISTROS EM BANCO</div>
                <div class="table-header">
                    <span class="col-name">ID / NOME</span>
                    <span class="col-status">STATUS</span>
                    <span class="col-actions">AÇÕES</span>
                </div>
                <div id="data-list" class="data-list"></div>
            </section>
        </main>
    </div>

    <div id="modal-edit" class="overlay">
        <div class="modal">
            <div class="panel-header">MODIFICAR DADOS</div>
            <input type="hidden" id="edit-id">
            <div class="modal-body">
                <label>NOME</label>
                <input type="text" id="edit-cliente">
                <label>STATUS</label>
                <select id="edit-status">
                    <option value="Pendente">PENDENTE</option>
                    <option value="Em Andamento">EM ANDAMENTO</option>
                    <option value="Concluido">CONCLUIDO</option>
                </select>
                <div class="modal-btns">
                    <button class="btn-off" onclick="closeModal('modal-edit')">CANCELAR</button>
                    <button class="btn-on" onclick="salvar()">GRAVAR</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-del" class="overlay">
        <div class="modal">
            <div class="panel-header alert">CONFIRMAR EXCLUSÃO</div>
            <input type="hidden" id="del-id">
            <div class="modal-body">
                <p>O REGISTRO SERÁ REMOVIDO PERMANENTEMENTE DO SISTEMA.</p>
                <div class="modal-btns">
                    <button class="btn-off" onclick="closeModal('modal-del')">VOLTAR</button>
                    <button class="btn-danger" onclick="confirmarDel()">CONFIRMAR</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
