<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 Delivery Manager | Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blob"></div>
    
    <div class="container">
        <header class="main-header">
            <div class="logo-area">
                <span class="logo-icon">🚀</span>
                <div>
                    <h1>DashOrders</h1>
                    <p>Logística & Controle • Grupo 6</p>
                </div>
            </div>
            <div class="user-profile">
                <span>Olá, <strong>Roni Herculano</strong></span>
            </div>
        </header>
        
        <main class="dashboard-grid">
            <aside class="side-panel">
                <div class="glass-card">
                    <h3>➕ Novo Registro</h3>
                    <div class="form-group">
                        <label>Cliente</label>
                        <input type="text" id="cliente" placeholder="Nome completo...">
                    </div>
                    <div class="form-group">
                        <label>Prioridade/Status</label>
                        <select id="status">
                            <option value="Pendente">⏳ Pendente</option>
                            <option value="Em Andamento">⚙️ Em Andamento</option>
                            <option value="Concluído">✅ Concluído</option>
                        </select>
                    </div>
                    <button class="btn-primary" onclick="criarPedido()">Lançar Pedido</button>
                </div>
            </aside>

            <section class="content-panel">
                <div class="section-title">
                    <h3>📦 Pedidos em Fluxo</h3>
                    <span id="order-count" class="count-badge">0 total</span>
                </div>
                <div id="lista-pedidos" class="orders-container">
                    </div>
            </section>
        </main>
    </div>

    <div id="modal-editar" class="modal-overlay">
        <div class="modal-card">
            <h3>✏️ Atualizar Pedido</h3>
            <input type="hidden" id="edit-id">
            <div class="form-group">
                <label>Cliente</label>
                <input type="text" id="edit-cliente">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="edit-status">
                    <option value="Pendente">⏳ Pendente</option>
                    <option value="Em Andamento">⚙️ Em Andamento</option>
                    <option value="Concluído">✅ Concluído</option>
                </select>
            </div>
            <div class="modal-btns">
                <button class="btn-ghost" onclick="fecharModal()">Voltar</button>
                <button class="btn-primary" onclick="salvarEdicao()">Salvar</button>
            </div>
        </div>
    </div>

    <div id="modal-excluir" class="modal-overlay">
        <div class="modal-card alert">
            <div class="alert-icon">🗑️</div>
            <h3>Remover Registro?</h3>
            <p>Esta ação não poderá ser revertida no banco de dados.</p>
            <input type="hidden" id="delete-id">
            <div class="modal-btns">
                <button class="btn-ghost" onclick="fecharModalExcluir()">Cancelar</button>
                <button class="btn-danger" onclick="confirmarExclusao()">Sim, Excluir</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
