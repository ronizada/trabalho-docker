<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Pedidos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Controle de Pedidos</h1>
        
        <div class="form-container">
            <h3 style="grid-column: 1 / -1; margin-top: 0;">Novo Pedido</h3>
            <div>
                <label style="display:block; font-size:12px; font-weight:bold; color:var(--secondary);">Cliente</label>
                <input type="text" id="cliente" placeholder="Nome do Cliente">
            </div>
            <div>
                <label style="display:block; font-size:12px; font-weight:bold; color:var(--secondary);">Status</label>
                <select id="status">
                    <option value="Pendente">Pendente</option>
                    <option value="Em Andamento">Em Andamento</option>
                    <option value="Concluído">Concluído</option>
                </select>
            </div>
            <button onclick="criarPedido()">Salvar Pedido</button>
        </div>

        <div class="list-container">
            <h3>Lista de Pedidos</h3>
            <ul id="lista-pedidos"></ul>
        </div>
    </div>

    <div id="modal-editar" class="modal">
        <div class="modal-content">
            <h3>Editar Pedido</h3>
            <input type="hidden" id="edit-id">
            <label>Nome do Cliente:</label>
            <input type="text" id="edit-cliente">
            <label>Status:</label>
            <select id="edit-status">
                <option value="Pendente">Pendente</option>
                <option value="Em Andamento">Em Andamento</option>
                <option value="Concluído">Concluído</option>
            </select>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="fecharModal()">Cancelar</button>
                <button onclick="salvarEdicao()">Confirmar Alteração</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
