<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashOrders PRO | Dark Mode</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <h1>🛸 DashOrders <span class="badge-pro">PRO</span></h1>
                <p>Logística & Controle • Grupo 6</p>
            </div>
            <div class="stats-badge">
                <span id="total-pedidos">0</span> Registros ativos
            </div>
        </header>

        <section class="card">
            <h3>➕ Novo Registro</h3>
            <div class="input-group">
                <div class="field">
                    <label>Nome do Cliente</label>
                    <input type="text" id="cliente" placeholder="Ex: Roni Herculano">
                </div>
                <div class="field">
                    <label>Prioridade / Status</label>
                    <select id="status">
                        <option value="Pendente">⏳ Pendente</option>
                        <option value="Em Andamento">⚙️ Em Andamento</option>
                        <option value="Concluído">✅ Concluído</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="criarPedido()">Lançar Pedido</button>
            </div>
        </section>

        <section class="card">
            <h3>📦 Fluxo de Pedidos</h3>
            <ul id="lista-pedidos"></ul>
        </section>
    </div>

    <div id="modal-editar" class="modal-overlay">
        <div class="modal-box">
            <h3>Editar Registro</h3>
            <input type="hidden" id="edit-id">
            <div class="field">
                <label>Nome do Cliente</label>
                <input type="text" id="edit-cliente">
            </div>
            <div class="field">
                <label>Status</label>
                <select id="edit-status">
                    <option value="Pendente">Pendente</option>
                    <option value="Em Andamento">Em Andamento</option>
                    <option value="Concluído">Concluído</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn-sec" onclick="fecharModal()">Cancelar</button>
                <button class="btn-primary" onclick="salvarEdicao()">Salvar Alterações</button>
            </div>
        </div>
    </div>

    <div id="modal-confirm" class="modal-overlay">
        <div class="modal-box">
            <div class="icon-warning">⚠️</div>
            <h3>Remover Registro?</h3>
            <p>Esta ação não pode ser desfeita no banco de dados.</p>
            <input type="hidden" id="id-para-deletar">
            <div class="modal-buttons">
                <button class="btn-sec" onclick="fecharModalConfirm()">Voltar</button>
                <button class="btn-danger" onclick="executarExclusao()">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
