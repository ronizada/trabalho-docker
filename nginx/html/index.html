<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashOrders | Grupo 6</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <h1>🚀 DashOrders</h1>
                <p>Logística & Controle • Grupo 6</p>
            </div>
            <div class="stats-badge">
                <span id="total-pedidos">0</span> Registros
            </div>
        </header>

        <section class="form-section">
            <h3>➕ Novo Registro</h3>
            <div class="input-group">
                <div class="field">
                    <label>Cliente</label>
                    <input type="text" id="cliente" placeholder="Nome completo...">
                </div>
                <div class="field">
                    <label>Status</label>
                    <select id="status">
                        <option value="Pendente">⏳ Pendente</option>
                        <option value="Em Andamento">⚙️ Em Andamento</option>
                        <option value="Concluído">✅ Concluído</option>
                    </select>
                </div>
                <button class="btn-main" onclick="criarPedido()">Lançar Pedido</button>
            </div>
        </section>

        <section class="list-section">
            <h3>📦 Pedidos em Fluxo</h3>
            <ul id="lista-pedidos"></ul>
        </section>
    </div>

    <div id="modal-editar" class="modal">...</div>
    <div id="modal-excluir" class="modal">...</div>
    <div id="toast-container" class="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
