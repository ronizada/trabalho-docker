<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pedidos | Grupo 6</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Controle de Pedidos</h1>
            <p>Gerenciamento de ordens de serviço - Roni Herculano</p>
        </header>
        
        <div class="form-card">
            <h3>✨ Novo Pedido</h3>
            <div class="grid-form">
                <div class="input-group">
                    <label>Cliente</label>
                    <input type="text" id="cliente" placeholder="Ex: Roni Junior">
                </div>
                <div class="input-group">
                    <label>Status Inicial</label>
                    <select id="status">
                        <option value="Pendente">Pendente</option>
                        <option value="Em Andamento">Em Andamento</option>
                        <option value="Concluído">Concluído</option>
                    </select>
                </div>
                <button class="btn-main" onclick="criarPedido()">Criar Pedido</button>
            </div>
        </div>

        <div class="list-section">
            <h3>📋 Pedidos Ativos</h3>
            <div id="lista-pedidos" class="grid-list">
                </div>
        </div>
    </div>

    <div id="modal-editar" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Editar Registro</h3>
                <span class="close" onclick="fecharModal()">&times;</span>
            </div>
            <input type="hidden" id="edit-id">
            <div class="input-group">
                <label>Nome do Cliente</label>
                <input type="text" id="edit-cliente">
            </div>
            <div class="input-group">
                <label>Status do Pedido</label>
                <select id="edit-status">
                    <option value="Pendente">Pendente</option>
                    <option value="Em Andamento">Em Andamento</option>
                    <option value="Concluído">Concluído</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
                <button class="btn-save" onclick="salvarEdicao()">Salvar Alterações</button>
            </div>
        </div>
    </div>

    <div id="modal-excluir" class="modal">
        <div class="modal-content confirm-modal">
            <div class="icon-warning">⚠️</div>
            <h3>Tem certeza?</h3>
            <p>Você está prestes a excluir este pedido. Esta ação é irreversível.</p>
            <input type="hidden" id="delete-id">
            <div class="modal-footer">
                <button class="btn-cancel" onclick="fecharModalExcluir()">Voltar</button>
                <button class="btn-danger" onclick="confirmarExclusao()">Sim, Excluir</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
